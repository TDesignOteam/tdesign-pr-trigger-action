        uses: ./
        with:
          token: ${{ secrets.TDESIGN_BOT_TOKEN }}
          owner: Tencent
          repo: tdesign-common
          pr_number: 2018
          trigger: /pr-mobile-vue
          dry-run: true

  pr-mobile-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: test
        uses: ./
        with:
          token: ${{ secrets.TDESIGN_BOT_TOKEN }}
          owner: Tencent
          repo: tdesign-common
          pr_number: 2018
          trigger: /pr-mobile-react
          dry-run: true

  pr-miniprogram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: test
