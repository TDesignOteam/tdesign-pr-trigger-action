name: test-tdesign-common-trigger
on:
  pull_request:
    branches: [develop]
    paths:
      - dist/*

jobs:
  pr-vue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: test
        uses: ./
        with:
          token: ${{ secrets.TDESIGN_BOT_TOKEN }}
          owner: Tencent
          repo: tdesign-common
          pr_number: 2006
          trigger: /pr-vue
          dry-run: true

  pr-vue-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: test
        uses: ./
        with:
          token: ${{ secrets.TDESIGN_BOT_TOKEN }}
          owner: Tencent
          repo: tdesign-common
          pr_number: 2006
          trigger: /pr-vue-next
          dry-run: true

  pr-react:
